<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { YA } from './js/particles/YA.js';

        const wrapper = new YA({
            container: document.getElementById('particles-container'),
            theme: 'light',
            particlesScale: 0.75,
            density: 200,
            interactive: true,
            gui: false,
            verbose: false,
            ringWidth: 0.15,
            ringWidth2: 0.05,
            ringDisplacement: 0.15,
        });

        function animate() {
            requestAnimationFrame(animate);
            wrapper.render();
        }
        animate();

        console.log('Particles loaded successfully!');
    </script>
</body>
</html>
