<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>无径之巅 冰湖回响</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=2">
    <meta name="theme-color" content="#000">
    <meta name="description" content="在代码的雪山中凿刻路径，在算法的冰湖里投下石子。一个初学者的学习笔记与日常记录">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://at.alicdn.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://at.alicdn.com">
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SimonAKing/font/font.min.css">
    <link rel="stylesheet" href="landing/style.css">
    <style>
        .content-main {
            background: #000 !important;
        }

        .content-main #card {
            position: relative;
            z-index: 10;
        }

        #matrixBg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <main>
        <!-- Intro Screen with Fluid Background -->
        <div class="content content-intro">
            <div class="content-inner">
                <canvas id="background"></canvas>
                <div class="wrap fade">
                    <h2 class="content-title">无径之巅，冰湖回响</h2>
                    <h3 class="content-subtitle" original-content="在无人之境，找寻思维褶皱，在寂静冰湖，投石问路">&nbsp;</h3>
                    <a class="enter" role="button" tabindex="0">PRESS START</a>
                    <div class="arrow arrow-1"></div>
                    <div class="arrow arrow-2"></div>
                </div>
            </div>
            <div class="shape-wrap">
                <svg class="shape" width="100%" height="100vh" preserveAspectRatio="none" viewBox="0 0 1440 800"
                    xmlns:pathdata="http://www.codrops.com/">
                    <path
                        d="M -44,-50 C -52.71,28.52 15.86,8.186 184,14.69 383.3,22.39 462.5,12.58 638,14 835.5,15.6 987,6.4 1194,13.86 1661,30.68 1652,-36.74 1582,-140.1 1512,-243.5 15.88,-589.5 -44,-50 Z"
                        pathdata:id="M -44,-50 C -137.1,117.4 67.86,445.5 236,452 435.3,459.7 500.5,242.6 676,244 873.5,245.6 957,522.4 1154,594 1593,753.7 1793,226.3 1582,-126 1371,-478.3 219.8,-524.2 -44,-50 Z">
                    </path>
                </svg>
            </div>
        </div>

        <!-- Main Screen with Rezmason Matrix Background -->
        <div class="content content-main" style="background:#000 !important;">
            <!-- Rezmason Matrix Effect via iframe -->
            <iframe id="matrixBg" src="/matrix/?skipIntro=true" title="Matrix digital rain background effect"></iframe>

            <div id="card">
                <div class="card-inner fade">
                    <header>
                        <img src="assets/avatar.jpg" width="100" height="100" alt="avatar"
                            onerror="this.style.display='none'">
                        <h1>松鹤猫院</h1>
                        <h2 id="signature">I've got a long way to go</h2>
                    </header>
                    <ul>
                        <li><a href="/blog/" aria-label="Blog">
                                <span class="icon-svg" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                        <line x1="16" y1="13" x2="8" y2="13"></line>
                                        <line x1="16" y1="17" x2="8" y2="17"></line>
                                        <polyline points="10 9 9 9 8 9"></polyline>
                                    </svg>
                                </span>
                                <span>blog</span>
                            </a></li>
                        <li><a href="/about/" aria-label="About">
                                <span class="icon-svg" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </span>
                                <span>about</span>
                            </a></li>
                        <li><a href="/archives/" aria-label="Archives">
                                <span class="icon-svg" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                                        <path d="M9 21h6"></path>
                                        <path d="M10 18h4"></path>
                                        <path d="M12 3a7 7 0 0 0-4 12.74V18h8v-2.26A7 7 0 0 0 12 3z"></path>
                                    </svg>
                                </span>
                                <span>archives</span>
                            </a></li>
                        <li><a href="/projects/" aria-label="Program">
                                <span class="icon-svg" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                                        <rect x="3" y="3" width="7" height="7"></rect>
                                        <rect x="14" y="3" width="7" height="7"></rect>
                                        <rect x="14" y="14" width="7" height="7"></rect>
                                        <rect x="3" y="14" width="7" height="7"></rect>
                                    </svg>
                                </span>
                                <span>program</span>
                            </a></li>
                        <li><a href="/thinking/" aria-label="Thinking">
                                <span class="icon-svg" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                        <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                        <line x1="15" y1="9" x2="15.01" y2="9"></line>
                                    </svg>
                                </span>
                                <span>thinking</span>
                            </a></li>
                    </ul>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
        <script>
            window.$ = selector => document.querySelector(selector);
            const getOriginalContent = selector => $(selector).getAttribute("original-content");
            window.subtitle = getOriginalContent(".content-subtitle");
            window.signature = "I've got a long way to go";
            window.config = {
                SIM_RESOLUTION: 128,
                DYE_RESOLUTION: 1024,
                CAPTURE_RESOLUTION: 512,
                DENSITY_DISSIPATION: 1,
                VELOCITY_DISSIPATION: 0.2,
                PRESSURE: 0.8,
                PRESSURE_ITERATIONS: 20,
                CURL: 30,
                SPLAT_RADIUS: 0.25,
                SPLAT_FORCE: 6000,
                SHADING: true,
                COLORFUL: true,
                COLOR_UPDATE_SPEED: 10,
                PAUSED: false,
                BACK_COLOR: { r: 30, g: 31, b: 33 },
                TRANSPARENT: false,
                BLOOM: true,
                BLOOM_ITERATIONS: 8,
                BLOOM_RESOLUTION: 256,
                BLOOM_INTENSITY: 0.4,
                BLOOM_THRESHOLD: 0.8,
                BLOOM_SOFT_KNEE: 0.7,
                SUNRAYS: true,
                SUNRAYS_RESOLUTION: 196,
                SUNRAYS_WEIGHT: 1.0,
            };
            window.blogUrl = '/archives/';
        </script>
        <script src="landing/main.js"></script>
        <script src="landing/background.js"></script>
    </main>
</body>

</html>
